name: web-shell-e2e

on:
  pull_request:
    paths:
      - 'web-shell/**'
      - 'crates/diagram-wasm/**'
      - 'crates/diagram-core/**'
      - 'crates/diagram-scene/**'
      - 'crates/diagram-commands/**'
      - 'crates/diagram-render-svg/**'
      - '.github/workflows/web-shell-e2e.yml'
  push:
    branches: [main]
    paths:
      - 'web-shell/**'
      - 'crates/diagram-wasm/**'

# Cancel in-progress runs on the same PR/branch when new commits arrive.
concurrency:
  group: web-shell-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-shell/package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked || echo "wasm-pack already installed"

      - name: Install web-shell deps
        run: npm ci
        working-directory: web-shell

      - name: Build WASM bundle
        run: npm run build:wasm
        working-directory: web-shell

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web-shell

      - name: Run Playwright E2E
        run: npm run test:e2e
        working-directory: web-shell

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            web-shell/playwright-report/
            web-shell/test-results/
          retention-days: 14

      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs-${{ github.run_id }}
          path: |
            web-shell/tests/e2e/**/*.spec.ts-snapshots/*-actual.*
            web-shell/tests/e2e/**/*.spec.ts-snapshots/*-diff.*
          if-no-files-found: ignore
          retention-days: 14
